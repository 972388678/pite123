<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>会员卡管理系统</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#1E40AF',
                        secondary: '#F97316',
                        neutral: '#F3F4F6',
                    }
                }
            }
        }
    </script>
    <style type="text/tailwindcss">
        @layer utilities {
            .btn-primary { @apply bg-primary text-white px-4 py-2 rounded-lg hover:bg-primary/90 transition-all flex items-center gap-2; }
            .btn-secondary { @apply bg-secondary text-white px-4 py-2 rounded-lg hover:bg-secondary/90 transition-all flex items-center gap-2; }
            .btn-outline { @apply border border-primary text-primary px-4 py-2 rounded-lg hover:bg-primary/10 transition-all flex items-center gap-2; }
            .btn-danger { @apply border border-red-500 text-red-500 px-4 py-2 rounded-lg hover:bg-red-50 transition-all flex items-center gap-2; }
            .input-field { @apply w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-primary/50; }
            .tab-active { @apply border-b-2 border-primary text-primary; }
            .badge { @apply px-2 py-1 text-xs rounded-full font-medium; }
            .badge-success { @apply bg-green-100 text-green-800; }
            .badge-danger { @apply bg-red-100 text-red-800; }
            .badge-blue { @apply bg-blue-100 text-blue-800; }
            .disabled-btn { @apply bg-gray-300 text-gray-500 cursor-not-allowed px-4 py-2 rounded-lg flex items-center gap-2; }
            .disabled-tab { @apply flex-1 py-4 text-center font-medium text-gray-400 cursor-not-allowed; }
        }
    </style>
</head>
<body class="bg-neutral min-h-screen">
    <div id="loginPage" class="flex items-center justify-center min-h-screen">
        <div class="bg-white rounded-lg shadow-md p-8 w-full max-w-md">
            <div class="text-center mb-6">
                <i class="fa fa-credit-card text-primary text-4xl mb-3"></i>
                <h1 class="text-2xl font-bold text-gray-800">会员卡管理系统</h1>
                <p class="text-gray-500 mt-1">请输入登录密码</p>
            </div>
            <form id="loginForm">
                <div class="mb-4">
                    <label class="block text-sm font-medium text-gray-700 mb-2">登录密码</label>
                    <input type="password" id="loginPwd" class="input-field" placeholder="输入密码后登录" required>
                </div>
                <button type="submit" class="btn-primary w-full py-3">
                    <i class="fa fa-sign-in"></i> 登录系统
                </button>
            </form>
            <div id="loginError" class="mt-4 text-red-500 text-sm text-center hidden">密码错误，请重新输入</div>
        </div>
    </div>

    <div id="mainSystem" class="hidden">
        <header class="bg-white shadow-md sticky top-0 z-50">
            <div class="container mx-auto px-4 py-3 flex justify-between items-center">
                <div class="flex items-center gap-2">
                    <i class="fa fa-credit-card text-primary text-2xl"></i>
                    <h1 class="text-xl font-bold text-gray-800">会员卡管理系统</h1>
                </div>
                <div class="flex items-center gap-3">
                    <span id="userRole" class="text-sm text-gray-600"></span>
                    <button id="logoutBtn" class="btn-outline py-1 px-3 text-sm">
                        <i class="fa fa-sign-out"></i> 退出登录
                    </button>
                </div>
            </div>
        </header>

        <main class="container mx-auto px-4 py-6">
            <div class="bg-white rounded-lg shadow-sm mb-6 overflow-hidden">
                <div class="flex border-b flex-wrap">
                    <button id="tabMembers" class="tab-btn tab-active flex-1 py-4 text-center font-medium" data-tab="members">
                        <i class="fa fa-users mr-2"></i>会员管理
                    </button>
                    <button id="tabConsume" class="tab-btn flex-1 py-4 text-center font-medium text-gray-600 hover:text-primary" data-tab="consume">
                        <i class="fa fa-shopping-cart mr-2"></i>会员扣卡消费
                    </button>
                    <button id="tabMemberTypes" class="tab-btn flex-1 py-4 text-center font-medium text-gray-600 hover:text-primary" data-tab="memberTypes">
                        <i class="fa fa-id-card-o mr-2"></i>会员卡类型
                    </button>
                    <button id="tabProducts" class="tab-btn flex-1 py-4 text-center font-medium text-gray-600 hover:text-primary" data-tab="products">
                        <i class="fa fa-list-alt mr-2"></i>消费项目
                    </button>
                </div>
            </div>

            <div id="members" class="tab-content">
                <div class="bg-white rounded-lg shadow-sm p-6 mb-6">
                    <div class="flex flex-wrap justify-between items-center gap-4 mb-6">
                        <h2 class="text-xl font-bold text-gray-800">会员管理</h2>
                        <div class="flex gap-3">
                            <input type="text" id="memberSearch" placeholder="搜索姓名/手机号" class="input-field w-48">
                            <button id="addMemberBtn" class="btn-primary">
                                <i class="fa fa-plus"></i>添加会员
                            </button>
                        </div>
                    </div>
                    <div class="overflow-x-auto">
                        <table class="w-full min-w-[900px]">
                            <thead>
                                <tr class="border-b">
                                    <th class="py-3 px-4 text-left text-sm text-gray-500">会员信息</th>
                                    <th class="py-3 px-4 text-left text-sm text-gray-500">卡类型</th>
                                    <th class="py-3 px-4 text-left text-sm text-gray-500">密码</th>
                                    <th class="py-3 px-4 text-left text-sm text-gray-500">使用范围</th>
                                    <th class="py-3 px-4 text-left text-sm text-gray-500">账户余额</th>
                                    <th class="py-3 px-4 text-left text-sm text-gray-500">果盘</th>
                                    <th class="py-3 px-4 text-left text-sm text-gray-500">小吃</th>
                                    <th class="py-3 px-4 text-left text-sm text-gray-500">基础酒水</th>
                                    <th class="py-3 px-4 text-left text-sm text-gray-500">中级酒水</th>
                                    <th class="py-3 px-4 text-left text-sm text-gray-500">高级酒水</th>
                                    <th class="py-3 px-4 text-left text-sm text-gray-500">顶级酒水</th>
                                    <th class="py-3 px-4 text-right text-sm text-gray-500">操作</th>
                                </tr>
                            </thead>
                            <tbody id="memberList"></tbody>
                        </table>
                    </div>
                    <div id="noMembers" class="text-center py-12 hidden">
                        <i class="fa fa-users text-gray-300 text-5xl mb-4"></i>
                        <p class="text-gray-500">暂无会员</p>
                    </div>
                </div>
            </div>

            <div id="consume" class="tab-content hidden">
                <div class="bg-white rounded-lg shadow-sm p-6">
                    <h2 class="text-xl font-bold text-gray-800 mb-6">会员领取/消费结算</h2>
                    <div class="mb-5">
                        <label class="block text-sm font-medium text-gray-700 mb-2">选择会员</label>
                        <select id="consumeMemberSelect" class="input-field">
                            <option value="">请选择会员</option>
                        </select>
                    </div>
                    <div id="memberRightsPreview" class="mb-5 hidden">
                        <label class="block text-sm font-medium text-gray-700 mb-2">会员剩余赠送权益</label>
                        <div class="grid grid-cols-3 md:grid-cols-6 gap-3 p-4 bg-gray-50 rounded-lg" id="rightsPreviewBox"></div>
                        <p class="text-red-500 text-sm mt-2">⚠️ 领取赠送品类，请选择【扣赠送权益】；正常消费选择【扣余额】</p>
                    </div>
                    <div class="mb-5">
                        <label class="block text-sm font-medium text-gray-700 mb-2">消费/领取明细</label>
                        <div id="consumeItemBox" class="border rounded-lg p-4 space-y-3">
                            <div class="flex flex-wrap gap-3 item-row">
                                <select class="input-field flex-1 min-w-[200px] consume-product">
                                    <option value="">选择项目</option>
                                </select>
                                <input type="number" min="1" value="1" class="input-field w-24 consume-num" placeholder="数量">
                                <select class="input-field w-32 consume-pay-type">
                                    <option value="balance">扣余额(现金)</option>
                                    <option value="rights">扣赠送权益(领取)</option>
                                </select>
                                <span class="self-center price-text w-20 text-gray-600">¥0.00</span>
                                <button type="button" class="btn-danger del-row">删除</button>
                            </div>
                        </div>
                        <button id="addConsumeRow" class="btn-outline mt-3 text-sm">
                            <i class="fa fa-plus"></i> 新增一行
                        </button>
                    </div>
                    <div class="border-t pt-4 mt-4">
                        <div class="flex justify-between text-lg mb-2">
                            <span>本次现金消费：</span>
                            <span id="deductBalanceMoney" class="text-red-600 font-bold">¥0.00</span>
                        </div>
                        <div class="flex justify-between text-lg mb-4">
                            <span>会员账户余额：</span>
                            <span id="memberBalanceShow" class="text-primary font-bold">¥0.00</span>
                        </div>
                        <button id="submitConsume" class="btn-secondary w-full py-3 text-lg">
                            <i class="fa fa-check"></i> 确认结算
                        </button>
                    </div>
                </div>
            </div>

            <div id="memberTypes" class="tab-content hidden">
                <div class="bg-white rounded-lg shadow-sm p-6">
                    <div class="flex justify-between items-center mb-6">
                        <h2 class="text-xl font-bold text-gray-800">会员卡类型 & 赠送权益配置</h2>
                        <button id="addMemberTypeBtn" class="btn-primary">
                            <i class="fa fa-plus"></i>新增卡类型
                        </button>
                    </div>
                    <div id="memberTypeList" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div>
                </div>
            </div>

            <div id="products" class="tab-content hidden">
                <div class="bg-white rounded-lg shadow-sm p-6">
                    <div class="flex flex-wrap justify-between items-center gap-4 mb-6">
                        <h2 class="text-xl font-bold text-gray-800">消费项目管理</h2>
                        <div class="flex gap-3">
                            <input type="text" id="productSearch" placeholder="搜索项目" class="input-field w-48">
                            <button id="addProductBtn" class="btn-primary">
                                <i class="fa fa-plus"></i>新增项目
                            </button>
                        </div>
                    </div>
                    <div class="overflow-x-auto">
                        <table class="w-full min-w-[600px]">
                            <thead>
                                <tr class="border-b">
                                    <th class="py-3 px-4 text-left text-sm text-gray-500">项目名称</th>
                                    <th class="py-3 px-4 text-left text-sm text-gray-500">单价</th>
                                    <th class="py-3 px-4 text-left text-sm text-gray-500">权益类型</th>
                                    <th class="py-3 px-4 text-left text-sm text-gray-500">状态</th>
                                    <th class="py-3 px-4 text-right text-sm text-gray-500">操作</th>
                                </tr>
                            </thead>
                            <tbody id="productList"></tbody>
                        </table>
                    </div>
                    <div id="noProducts" class="text-center py-12 hidden">
                        <i class="fa fa-shopping-cart text-gray-300 text-5xl mb-4"></i>
                        <p class="text-gray-500">暂无项目</p>
                    </div>
                </div>
            </div>
        </main>

        <div id="addMemberModal" class="fixed inset-0 bg-black/50 z-50 flex items-center justify-center hidden">
            <div class="bg-white rounded-lg w-full max-w-md mx-4 p-5">
                <h3 class="text-lg font-bold mb-4">添加会员</h3>
                <form id="addMemberForm">
                    <div class="mb-3">
                        <label class="block text-sm mb-1">姓名</label>
                        <input type="text" id="memberName" class="input-field" required>
                    </div>
                    <div class="mb-3">
                        <label class="block text-sm mb-1">手机号</label>
                        <input type="tel" id="memberPhone" class="input-field" required>
                    </div>
                    <div class="mb-3">
                        <label class="block text-sm mb-1">会员卡密码</label>
                        <input type="text" id="memberPwd" class="input-field" placeholder="仅记录，无登录功能">
                    </div>
                    <div class="mb-3">
                        <label class="block text-sm mb-1">使用范围</label>
                        <input type="text" id="memberScope" class="input-field" placeholder="例如：仅限XX门店使用">
                    </div>
                    <div class="mb-3">
                        <label class="block text-sm mb-1">会员卡类型</label>
                        <select id="memberTypeSelect" class="input-field" required></select>
                    </div>
                    <div class="mb-4">
                        <label class="block text-sm mb-1">充值金额</label>
                        <input type="number" id="memberBalance" class="input-field" min="0" required>
                    </div>
                    <div class="flex gap-3 justify-end">
                        <button type="button" class="close-modal btn-outline">取消</button>
                        <button type="submit" class="btn-primary">保存</button>
                    </div>
                </form>
            </div>
        </div>

        <div id="editMemberModal" class="fixed inset-0 bg-black/50 z-50 flex items-center justify-center hidden">
            <div class="bg-white rounded-lg w-full max-w-md mx-4 p-5">
                <h3 class="text-lg font-bold mb-4">编辑会员信息</h3>
                <form id="editMemberForm">
                    <input type="hidden" id="editMemberId">
                    <div class="mb-3">
                        <label class="block text-sm mb-1">姓名</label>
                        <input type="text" id="editMemberName" class="input-field" required>
                    </div>
                    <div class="mb-3">
                        <label class="block text-sm mb-1">手机号</label>
                        <input type="tel" id="editMemberPhone" class="input-field" required>
                    </div>
                    <div class="mb-3">
                        <label class="block text-sm mb-1">会员卡密码</label>
                        <input type="text" id="editMemberPwd" class="input-field" placeholder="仅记录，无登录功能">
                    </div>
                    <div class="mb-3">
                        <label class="block text-sm mb-1">使用范围</label>
                        <input type="text" id="editMemberScope" class="input-field" placeholder="例如：仅限XX门店使用">
                    </div>
                    <div class="mb-3">
                        <label class="block text-sm mb-1">会员卡类型</label>
                        <select id="editMemberTypeSelect" class="input-field" required></select>
                    </div>
                    <div class="mb-3">
                        <label class="block text-sm mb-1">账户余额</label>
                        <input type="number" id="editMemberBalance" class="input-field" min="0" required>
                    </div>
                    <div class="grid grid-cols-3 gap-3 mb-4">
                        <div><label class="block text-sm mb-1">果盘</label><input type="number" id="editFruit" class="input-field" min="0"></div>
                        <div><label class="block text-sm mb-1">小吃</label><input type="number" id="editSnack" class="input-field" min="0"></div>
                        <div><label class="block text-sm mb-1">基础酒水</label><input type="number" id="editDrink1" class="input-field" min="0"></div>
                        <div><label class="block text-sm mb-1">中级酒水</label><input type="number" id="editDrink2" class="input-field" min="0"></div>
                        <div><label class="block text-sm mb-1">高级酒水</label><input type="number" id="editDrink3" class="input-field" min="0"></div>
                        <div><label class="block text-sm mb-1">顶级酒水</label><input type="number" id="editDrink4" class="input-field" min="0"></div>
                    </div>
                    <div class="flex gap-3 justify-end">
                        <button type="button" class="close-modal btn-outline">取消</button>
                        <button type="submit" class="btn-primary">保存修改</button>
                    </div>
                </form>
            </div>
        </div>

        <div id="addMemberTypeModal" class="fixed inset-0 bg-black/50 z-50 flex items-center justify-center hidden">
            <div class="bg-white rounded-lg w-full max-w-lg mx-4 p-5">
                <h3 class="text-lg font-bold mb-4">编辑会员卡权益</h3>
                <form id="addMemberTypeForm">
                    <div class="mb-3">
                        <label class="block text-sm mb-1">卡种名称</label>
                        <input type="text" id="memberTypeName" class="input-field" required>
                    </div>
                    <div class="mb-3">
                        <label class="block text-sm mb-1">充值金额(元)</label>
                        <input type="number" id="memberTypeRecharge" class="input-field" required>
                    </div>
                    <div class="grid grid-cols-3 gap-3 mb-4">
                        <div><label class="block text-sm mb-1">果盘</label><input type="number" id="typeFruit" class="input-field" min="0"></div>
                        <div><label class="block text-sm mb-1">小吃</label><input type="number" id="typeSnack" class="input-field" min="0"></div>
                        <div><label class="block text-sm mb-1">基础酒水</label><input type="number" id="typeDrink1" class="input-field" min="0"></div>
                        <div><label class="block text-sm mb-1">中级酒水</label><input type="number" id="typeDrink2" class="input-field" min="0"></div>
                        <div><label class="block text-sm mb-1">高级酒水</label><input type="number" id="typeDrink3" class="input-field" min="0"></div>
                        <div><label class="block text-sm mb-1">顶级酒水</label><input type="number" id="typeDrink4" class="input-field" min="0"></div>
                    </div>
                    <div class="mb-4">
                        <label class="block text-sm mb-1">备注</label>
                        <textarea id="memberTypeDesc" class="input-field" rows="2"></textarea>
                    </div>
                    <div class="flex gap-3 justify-end">
                        <button type="button" class="close-modal btn-outline">取消</button>
                        <button type="submit" class="btn-primary">保存</button>
                    </div>
                </form>
            </div>
        </div>

        <div id="addProductModal" class="fixed inset-0 bg-black/50 z-50 flex items-center justify-center hidden">
            <div class="bg-white rounded-lg w-full max-w-md mx-4 p-5">
                <h3 class="text-lg font-bold mb-4">新增消费项目</h3>
                <form id="addProductForm">
                    <div class="mb-3">
                        <label class="block text-sm mb-1">项目名称</label>
                        <input type="text" id="productName" class="input-field" required>
                    </div>
                    <div class="mb-3">
                        <label class="block text-sm mb-1">单价</label>
                        <input type="number" id="productPrice" class="input-field" min="0" step="0.01" required>
                    </div>
                    <div class="mb-4">
                        <label class="block text-sm mb-1">对应权益类型</label>
                        <select id="productRightType" class="input-field">
                            <option value="">非赠送项目（仅扣余额）</option>
                            <option value="fruit">精品果盘</option>
                            <option value="snack">小吃套餐</option>
                            <option value="drink1">基础酒水套餐</option>
                            <option value="drink2">中级酒水套餐</option>
                            <option value="drink3">高级酒水套餐</option>
                            <option value="drink4">顶级酒水套餐</option>
                        </select>
                    </div>
                    <div class="flex gap-3 justify-end">
                        <button type="button" class="close-modal btn-outline">取消</button>
                        <button type="submit" class="btn-primary">保存</button>
                    </div>
                </form>
            </div>
        </div>

        <div id="editProductModal" class="fixed inset-0 bg-black/50 z-50 flex items-center justify-center hidden">
            <div class="bg-white rounded-lg w-full max-w-md mx-4 p-5">
                <h3 class="text-lg font-bold mb-4">编辑项目</h3>
                <form id="editProductForm">
                    <input type="hidden" id="editProductId">
                    <div class="mb-3">
                        <label class="block text-sm mb-1">项目名称</label>
                        <input type="text" id="editProductName" class="input-field" required>
                    </div>
                    <div class="mb-3">
                        <label class="block text-sm mb-1">单价</label>
                        <input type="number" id="editProductPrice" class="input-field" min="0" step="0.01" required>
                    </div>
                    <div class="mb-3">
                        <label class="block text-sm mb-1">对应权益类型</label>
                        <select id="editProductRightType" class="input-field">
                            <option value="">非赠送项目（仅扣余额）</option>
                            <option value="fruit">精品果盘</option>
                            <option value="snack">小吃套餐</option>
                            <option value="drink1">基础酒水套餐</option>
                            <option value="drink2">中级酒水套餐</option>
                            <option value="drink3">高级酒水套餐</option>
                            <option value="drink4">顶级酒水套餐</option>
                        </select>
                    </div>
                    <div class="mb-4">
                        <label class="block text-sm mb-1">状态</label>
                        <select id="editProductStatus" class="input-field">
                            <option value="active">启用</option>
                            <option value="inactive">停用</option>
                        </select>
                    </div>
                    <div class="flex gap-3 justify-end">
                        <button type="button" class="close-modal btn-outline">取消</button>
                        <button type="submit" class="btn-primary">保存</button>
                    </div>
                </form>
            </div>
        </div>

        <div id="toast" class="fixed top-4 right-4 bg-green-500 text-white px-4 py-2 rounded-lg shadow-lg transition-transform translate-x-full z-50"></div>
    </div>

    <script>
        let currentRole = '';
        let members = [];
        let memberTypes = [];
        let products = [];
        const toast = document.getElementById('toast');

        const defaultData = {
            members: [],
            memberTypes: [
                {id:1,name:"铜卡",recharge:36000,fruit:3,snack:0,drink1:1,drink2:0,drink3:0,drink4:0,desc:"充值3.6W，赠送果盘×3、基础酒水×1"},
                {id:2,name:"银卡",recharge:66000,fruit:6,snack:6,drink1:2,drink2:0,drink3:0,drink4:0,desc:"充值6.6W，赠送果盘×6、小吃×6、基础酒水×2"},
                {id:3,name:"金卡",recharge:166000,fruit:16,snack:16,drink1:2,drink2:0,drink3:0,drink4:0,desc:"充值16.6W，赠送果盘×16、小吃×16、基础酒水×2"},
                {id:4,name:"钻卡",recharge:266000,fruit:26,snack:26,drink1:0,drink2:5,drink3:0,drink4:0,desc:"充值26.6W，赠送果盘×26、小吃×26、中级酒水×5"},
                {id:5,name:"至尊黑卡",recharge:666000,fruit:999,snack:999,drink1:0,drink2:0,drink3:10,drink4:0,desc:"充值66.6W，果盘/小吃不限量，高级酒水×10"}
            ],
            products: [
                {id:1,name:"精品果盘",price:0,rightType:"fruit",status:"active"},
                {id:2,name:"小吃套餐",price:0,rightType:"snack",status:"active"},
                {id:3,name:"基础酒水套餐",price:0,rightType:"drink1",status:"active"},
                {id:4,name:"中级酒水套餐",price:0,rightType:"drink2",status:"active"},
                {id:5,name:"高级酒水套餐",price:0,rightType:"drink3",status:"active"},
                {id:6,name:"顶级酒水套餐",price:0,rightType:"drink4",status:"active"},
                {id:7,name:"其他消费",price:100,rightType:"",status:"active"}
            ]
        };

        function loadData() {
            try {
                const local = localStorage.getItem('cardSystemData');
                if (local) {
                    const d = JSON.parse(local);
                    members = d.members || [];
                    memberTypes = d.memberTypes || defaultData.memberTypes;
                    products = d.products || defaultData.products;
                } else {
                    members = defaultData.members;
                    memberTypes = defaultData.memberTypes;
                    products = defaultData.products;
                    saveData();
                }
            } catch (e) {
                members = defaultData.members;
                memberTypes = defaultData.memberTypes;
                products = defaultData.products;
            }
        }

        function saveData() {
            localStorage.setItem('cardSystemData', JSON.stringify({ members, memberTypes, products }));
        }

        document.addEventListener('DOMContentLoaded', function () {
            loadData();
            initLogin();
            initModal();
        });

        function initLogin() {
            document.getElementById('loginForm').onsubmit = function (e) {
                e.preventDefault();
                const pwd = document.getElementById('loginPwd').value.trim();
                if (pwd === '8800') {
                    currentRole = 'boss';
                    document.getElementById('userRole').textContent = '当前身份：老板（全权限）';
                    showSystem();
                } else if (pwd === '1100') {
                    currentRole = 'employee';
                    document.getElementById('userRole').textContent = '当前身份：员工（仅扣费）';
                    showSystem();
                    limitEmployee();
                } else {
                    document.getElementById('loginError').classList.remove('hidden');
                }
            };
            document.getElementById('logoutBtn').onclick = function () {
                currentRole = '';
                document.getElementById('loginPage').classList.remove('hidden');
                document.getElementById('mainSystem').classList.add('hidden');
            };
        }

        function showSystem() {
            document.getElementById('loginPage').classList.add('hidden');
            document.getElementById('mainSystem').classList.remove('hidden');
            initTab();
            renderAll();
            bindConsume();
        }

        function limitEmployee() {
            document.getElementById('tabMemberTypes').className = 'disabled-tab';
            document.getElementById('tabProducts').className = 'disabled-tab';
            document.getElementById('addMemberBtn').className = 'disabled-btn';
            document.getElementById('addMemberBtn').disabled = true;
            document.getElementById('tabConsume').click();
        }

        function initTab() {
            const tabs = document.querySelectorAll('.tab-btn');
            const contents = document.querySelectorAll('.tab-content');
            tabs.forEach(btn => {
                btn.onclick = () => {
                    tabs.forEach(b => b.classList.remove('tab-active'));
                    btn.classList.add('tab-active');
                    contents.forEach(c => c.classList.add('hidden'));
                    const t = btn.dataset.tab;
                    document.getElementById(t).classList.remove('hidden');
                    if (t === 'consume') {
                        fillConsumeMember();
                        fillConsumeProduct();
                        calcTotal();
                    }
                };
            });
        }

        function initModal() {
            document.querySelectorAll('.close-modal').forEach(b => {
                b.onclick = () => document.querySelectorAll('.fixed.inset-0').forEach(m => m.classList.add('hidden'));
            });
        }

        function renderAll() {
            renderMemberType();
            fillMemberTypeSelect();
            renderMember();
            renderProduct();
        }

        function renderMember(list = members) {
            const box = document.getElementById('memberList');
            const empty = document.getElementById('noMembers');
            if (list.length === 0) { box.innerHTML = ''; empty.classList.remove('hidden'); return; }
            empty.classList.add('hidden');
            let html = '';
            list.forEach(m => {
                const r = m.rights || { fruit: 0, snack: 0, drink1: 0, drink2: 0, drink3: 0, drink4: 0 };
                const op = currentRole === 'boss' ? `
                <button class="btn-outline py-1 px-3 text-xs" onclick="editMember(${m.id})">编辑</button>
                <button class="btn-danger py-1 px-3 text-xs" onclick="delMember(${m.id})">删除</button>` : '';
                html += `<tr class="border-b hover:bg-gray-50">
                <td class="py-3 px-4">${m.name}<br><span class="text-xs text-gray-500">${m.phone}</span></td>
                <td class="py-3 px-4"><span class="badge badge-blue">${m.typeName}</span></td>
                <td class="py-3 px-4">${m.pwd || '-'}</td>
                <td class="py-3 px-4">${m.scope || '-'}</td>
                <td class="py-3 px-4 font-medium">¥${m.balance.toFixed(2)}</td>
                <td class="py-3 px-4">${r.fruit}</td>
                <td class="py-3 px-4">${r.snack}</td>
                <td class="py-3 px-4">${r.drink1}</td>
                <td class="py-3 px-4">${r.drink2}</td>
                <td class="py-3 px-4">${r.drink3}</td>
                <td class="py-3 px-4">${r.drink4}</td>
                <td class="py-3 px-4 text-right">${op}</td></tr>`;
            });
            box.innerHTML = html;
        }

        document.getElementById('addMemberForm').onsubmit = function (e) {
            e.preventDefault();
            const name = document.getElementById('memberName').value.trim();
            const phone = document.getElementById('memberPhone').value.trim();
            const pwd = document.getElementById('memberPwd').value.trim();
            const scope = document.getElementById('memberScope').value.trim();
            const typeId = +document.getElementById('memberTypeSelect').value;
            const balance = +document.getElementById('memberBalance').value;
            const t = memberTypes.find(x => x.id === typeId);
            members.push({
                id: Date.now(), name, phone, pwd, scope, typeId, typeName: t.name, balance,
                rights: { fruit: t.fruit, snack: t.snack, drink1: t.drink1, drink2: t.drink2, drink3: t.drink3, drink4: t.drink4 }
            });
            saveData();
            renderMember();
            this.reset();
            document.getElementById('addMemberModal').classList.add('hidden');
            showToast('会员添加成功');
        };

        window.delMember = function (id) {
            if (!confirm('确定删除？')) return;
            members = members.filter(m => m.id !== id);
            saveData();
            renderMember();
            showToast('已删除');
        };

        document.getElementById('memberSearch').oninput = function () {
            const k = this.value.toLowerCase();
            renderMember(members.filter(m => m.name.toLowerCase().includes(k) || m.phone.includes(k)));
        };

        document.getElementById('addMemberBtn').onclick = () => document.getElementById('addMemberModal').classList.remove('hidden');

        window.editMember = function (id) {
            const m = members.find(x => x.id === id);
            const r = m.rights;
            document.getElementById('editMemberId').value = m.id;
            document.getElementById('editMemberName').value = m.name;
            document.getElementById('editMemberPhone').value = m.phone;
            document.getElementById('editMemberPwd').value = m.pwd || '';
            document.getElementById('editMemberScope').value = m.scope || '';
            document.getElementById('editMemberBalance').value = m.balance;
            document.getElementById('editFruit').value = r.fruit;
            document.getElementById('editSnack').value = r.snack;
            document.getElementById('editDrink1').value = r.drink1;
            document.getElementById('editDrink2').value = r.drink2;
            document.getElementById('editDrink3').value = r.drink3;
            document.getElementById('editDrink4').value = r.drink4;
            const sel = document.getElementById('editMemberTypeSelect');
            sel.innerHTML = memberTypes.map(t => `<option value="${t.id}">${t.name}</option>`).join('');
            sel.value = m.typeId;
            document.getElementById('editMemberModal').classList.remove('hidden');
        };

        document.getElementById('editMemberForm').onsubmit = function (e) {
            e.preventDefault();
            const id = +document.getElementById('editMemberId').value;
            const name = document.getElementById('editMemberName').value.trim();
            const phone = document.getElementById('editMemberPhone').value.trim();
            const pwd = document.getElementById('editMemberPwd').value.trim();
            const scope = document.getElementById('editMemberScope').value.trim();
            const typeId = +document.getElementById('editMemberTypeSelect').value;
            const balance = +document.getElementById('editMemberBalance').value;
            const f = +document.getElementById('editFruit').value;
            const s = +document.getElementById('editSnack').value;
            const d1 = +document.getElementById('editDrink1').value;
            const d2 = +document.getElementById('editDrink2').value;
            const d3 = +document.getElementById('editDrink3').value;
            const d4 = +document.getElementById('editDrink4').value;
            const t = memberTypes.find(x => x.id === typeId);
            const idx = members.findIndex(x => x.id === id);
            members[idx] = {
                id, name, phone, pwd, scope, typeId, typeName: t.name, balance,
                rights: { fruit: f, snack: s, drink1: d1, drink2: d2, drink3: d3, drink4: d4 }
            };
            saveData();
            renderMember();
            document.getElementById('editMemberModal').classList.add('hidden');
            showToast('修改成功');
        };

        function renderMemberType() {
            const box = document.getElementById('memberTypeList');
            box.innerHTML = memberTypes.map(t => `
            <div class="border rounded-lg p-4">
                <div class="flex justify-between">
                    <div>
                        <div class="font-bold text-lg">${t.name}</div>
                        <div class="text-sm text-gray-500">充值:¥${(t.recharge / 10000).toFixed(1)}W</div>
                        <div class="text-sm text-gray-600 mt-1">果盘×${t.fruit} | 小吃×${t.snack}</div>
                        <div class="text-sm text-gray-600">基础×${t.drink1} | 中级×${t.drink2} | 高级×${t.drink3} | 顶级×${t.drink4}</div>
                        <div class="text-xs text-gray-400 mt-1">${t.desc}</div>
                    </div>
                    <button class="btn-outline text-xs h-fit" onclick="editType(${t.id})">编辑</button>
                </div>
            </div>`).join('');
        }

        function fillMemberTypeSelect() {
            const sel = document.getElementById('memberTypeSelect');
            sel.innerHTML = memberTypes.map(t => `<option value="${t.id}" data-recharge="${t.recharge}">${t.name}</option>`).join('');
            sel.onchange = () => {
                const val = sel.selectedOptions[0]?.dataset.recharge || 0;
                document.getElementById('memberBalance').value = val;
            };
        }

        document.getElementById('addMemberTypeForm').onsubmit = function (e) {
            e.preventDefault();
            const name = document.getElementById('memberTypeName').value.trim();
            const recharge = +document.getElementById('memberTypeRecharge').value;
            const f = +document.getElementById('typeFruit').value;
            const s = +document.getElementById('typeSnack').value;
            const d1 = +document.getElementById('typeDrink1').value;
            const d2 = +document.getElementById('typeDrink2').value;
            const d3 = +document.getElementById('typeDrink3').value;
            const d4 = +document.getElementById('typeDrink4').value;
            const desc = document.getElementById('memberTypeDesc').value.trim();
            const editId = this.dataset.editId;
            if (editId) {
                const idx = memberTypes.findIndex(x => x.id == editId);
                memberTypes[idx] = { id: +editId, name, recharge, fruit: f, snack: s, drink1: d1, drink2: d2, drink3: d3, drink4: d4, desc };
            } else {
                memberTypes.push({ id: Date.now(), name, recharge, fruit: f, snack: s, drink1: d1, drink2: d2, drink3: d3, drink4: d4, desc });
            }
            saveData();
            renderMemberType();
            fillMemberTypeSelect();
            this.reset();
            delete this.dataset.editId;
            document.getElementById('addMemberTypeModal').classList.add('hidden');
            showToast('保存成功');
        };

        window.editType = function (id) {
            const t = memberTypes.find(x => x.id === id);
            const f = document.getElementById('addMemberTypeForm');
            f.dataset.editId = id;
            document.getElementById('memberTypeName').value = t.name;
            document.getElementById('memberTypeRecharge').value = t.recharge;
            document.getElementById('typeFruit').value = t.fruit;
            document.getElementById('typeSnack').value = t.snack;
            document.getElementById('typeDrink1').value = t.drink1;
            document.getElementById('typeDrink2').value = t.drink2;
            document.getElementById('typeDrink3').value = t.drink3;
            document.getElementById('typeDrink4').value = t.drink4;
            document.getElementById('memberTypeDesc').value = t.desc || '';
            document.getElementById('addMemberTypeModal').classList.remove('hidden');
        };

        document.getElementById('addMemberTypeBtn').onclick = () => {
            const f = document.getElementById('addMemberTypeForm');
            f.reset();
            delete f.dataset.editId;
            document.getElementById('addMemberTypeModal').classList.remove('hidden');
        };

        function renderProduct(list = products) {
            const box = document.getElementById('productList');
            const empty = document.getElementById('noProducts');
            if (list.length === 0) { box.innerHTML = ''; empty.classList.remove('hidden'); return; }
            empty.classList.add('hidden');
            box.innerHTML = list.map(p => {
                const st = p.status === 'active' ? 'badge-success' : 'badge-danger';
                const op = currentRole === 'boss' ? `
                <button class="btn-outline py-1 px-3 text-xs" onclick="editProduct(${p.id})">编辑</button>
                <button class="btn-danger py-1 px-3 text-xs ml-2" onclick="delProduct(${p.id})">删除</button>` : '';
                return `<tr class="border-b hover:bg-gray-50">
                <td class="py-3 px-4">${p.name}</td>
                <td class="py-3 px-4">¥${p.price.toFixed(2)}</td>
                <td class="py-3 px-4">${p.rightType || '普通消费'}</td>
                <td class="py-3 px-4"><span class="badge ${st}">${p.status === 'active' ? '启用' : '停用'}</span></td>
                <td class="py-3 px-4 text-right">${op}</td></tr>`;
            }).join('');
        }

        window.delProduct = function (id) {
            if (!confirm('确定删除？')) return;
            products = products.filter(p => p.id !== id);
            saveData();
            renderProduct();
            showToast('已删除');
        };

        document.getElementById('addProductForm').onsubmit = function (e) {
            e.preventDefault();
            const name = document.getElementById('productName').value.trim();
            const price = +document.getElementById('productPrice').value;
            const rt = document.getElementById('productRightType').value;
            products.push({ id: Date.now(), name, price, rightType: rt, status: 'active' });
            saveData();
            renderProduct();
            this.reset();
            document.getElementById('addProductModal').classList.add('hidden');
            showToast('添加成功');
        };

        window.editProduct = function (id) {
            const p = products.find(x => x.id === id);
            document.getElementById('editProductId').value = p.id;
            document.getElementById('editProductName').value = p.name;
            document.getElementById('editProductPrice').value = p.price;
            document.getElementById('editProductRightType').value = p.rightType || '';
            document.getElementById('editProductStatus').value = p.status;
            document.getElementById('editProductModal').classList.remove('hidden');
        };

        document.getElementById('editProductForm').onsubmit = function (e) {
            e.preventDefault();
            const id = +document.getElementById('editProductId').value;
            const name = document.getElementById('editProductName').value.trim();
            const price = +document.getElementById('editProductPrice').value;
            const rt = document.getElementById('editProductRightType').value;
            const st = document.getElementById('editProductStatus').value;
            const idx = products.findIndex(x => x.id === id);
            products[idx] = { ...products[idx], name, price, rightType: rt, status: st };
            saveData();
            renderProduct();
            document.getElementById('editProductModal').classList.add('hidden');
            showToast('更新成功');
        };

        document.getElementById('addProductBtn').onclick = () => document.getElementById('addProductModal').classList.remove('hidden');
        document.getElementById('productSearch').oninput = function () {
            const k = this.value.toLowerCase();
            renderProduct(products.filter(p => p.name.toLowerCase().includes(k)));
        };

        function bindConsume() {
            document.getElementById('addConsumeRow').onclick = addConsumeRow;
            document.getElementById('submitConsume').onclick = submitConsume;
            const box = document.getElementById('consumeItemBox');
            box.addEventListener('input', calcTotal);
            box.addEventListener('change', calcTotal);
            box.addEventListener('click', e => {
                if (e.target.classList.contains('del-row')) {
                    const rows = document.querySelectorAll('.item-row');
                    if (rows.length <= 1) return showToast('至少保留一行');
                    e.target.closest('.item-row').remove();
                    calcTotal();
                }
            });
            document.getElementById('consumeMemberSelect').onchange = function () {
                const m = members.find(x => x.id === +this.value);
                if (m) {
                    document.getElementById('memberBalanceShow').innerText = `¥${m.balance.toFixed(2)}`;
                    document.getElementById('memberRightsPreview').classList.remove('hidden');
                    const r = m.rights;
                    document.getElementById('rightsPreviewBox').innerHTML = `
                    <div>果盘: <b>${r.fruit}</b></div>
                    <div>小吃: <b>${r.snack}</b></div>
                    <div>基础酒水: <b>${r.drink1}</b></div>
                    <div>中级酒水: <b>${r.drink2}</b></div>
                    <div>高级酒水: <b>${r.drink3}</b></div>
                    <div>顶级酒水: <b>${r.drink4}</b></div>`;
                } else {
                    document.getElementById('memberBalanceShow').innerText = '¥0.00';
                    document.getElementById('memberRightsPreview').classList.add('hidden');
                }
                calcTotal();
            };
        }

        function fillConsumeMember() {
            const sel = document.getElementById('consumeMemberSelect');
            sel.innerHTML = '<option value="">请选择会员</option>' + members.map(m => `<option value="${m.id}">${m.name} (${m.phone})</option>`).join('');
        }

        function fillConsumeProduct() {
            const list = products.filter(p => p.status === 'active');
            document.querySelectorAll('.consume-product').forEach(sel => {
                sel.innerHTML = '<option value="">选择项目</option>' + list.map(p => `<option value="${p.id}" data-price="${p.price}" data-right="${p.rightType}">${p.name} ¥${p.price.toFixed(2)}</option>`).join('');
            });
        }

        function addConsumeRow() {
            const list = products.filter(p => p.status === 'active');
            const opt = list.map(p => `<option value="${p.id}" data-price="${p.price}" data-right="${p.rightType}">${p.name} ¥${p.price.toFixed(2)}</option>`).join('');
            document.getElementById('consumeItemBox').insertAdjacentHTML('beforeend', `
            <div class="flex flex-wrap gap-3 item-row">
                <select class="input-field flex-1 min-w-[200px] consume-product"><option value="">选择项目</option>${opt}</select>
                <input type="number" min="1" value="1" class="input-field w-24 consume-num">
                <select class="input-field w-32 consume-pay-type">
                    <option value="balance">扣余额(现金)</option>
                    <option value="rights">扣赠送权益(领取)</option>
                </select>
                <span class="self-center price-text w-20 text-gray-600">¥0.00</span>
                <button type="button" class="btn-danger del-row">删除</button>
            </div>`);
            calcTotal();
        }

        function calcTotal() {
            let total = 0;
            document.querySelectorAll('.item-row').forEach(row => {
                const sel = row.querySelector('.consume-product');
                const num = +row.querySelector('.consume-num').value || 1;
                const price = +sel.selectedOptions[0]?.dataset.price || 0;
                const money = price * num;
                row.querySelector('.price-text').innerText = `¥${money.toFixed(2)}`;
                if (row.querySelector('.consume-pay-type').value === 'balance') total += money;
            });
            document.getElementById('deductBalanceMoney').innerText = `¥${total.toFixed(2)}`;
        }

        function submitConsume() {
            const mid = +document.getElementById('consumeMemberSelect').value;
            if (!mid) return showToast('请选择会员');
            const m = members.find(x => x.id === mid);
            const rows = document.querySelectorAll('.item-row');
            for (const row of rows) {
                const pid = +row.querySelector('.consume-product').value;
                const num = +row.querySelector('.consume-num').value || 1;
                const type = row.querySelector('.consume-pay-type').value;
                if (!pid) continue;
                const p = products.find(x => x.id === pid);
                if (type === 'balance') {
                    const mon = p.price * num;
                    if (m.balance < mon) return showToast('余额不足');
                } else {
                    const rt = p.rightType;
                    if (!rt) return showToast(p.name + ' 不支持权益抵扣');
                    if (m.rights[rt] < num) return showToast(p.name + ' 权益不足');
                }
            }
            for (const row of rows) {
                const pid = +row.querySelector('.consume-product').value;
                const num = +row.querySelector('.consume-num').value || 1;
                const type = row.querySelector('.consume-pay-type').value;
                if (!pid) continue;
                const p = products.find(x => x.id === pid);
                if (type === 'balance') m.balance -= p.price * num;
                else m.rights[p.rightType] -= num;
            }
            saveData();
            showToast('结算成功');
            fillConsumeMember();
            renderMember();
            document.getElementById('consumeMemberSelect').value = '';
            document.getElementById('memberRightsPreview').classList.add('hidden');
            document.getElementById('memberBalanceShow').innerText = '¥0.00';
        }

        function showToast(msg) {
            toast.textContent = msg;
            toast.classList.remove('translate-x-full');
            setTimeout(() => toast.classList.add('translate-x-full'), 2000);
        }
    </script>
</body>
</html>
