<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>会员卡管理系统 - 云端版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#1E40AF',
                        secondary: '#F97316',
                        neutral: '#F3F4F6',
                    }
                }
            }
        }
    </script>
    <style type="text/tailwindcss">
        @layer utilities {
            .btn-primary { @apply bg-primary text-white px-4 py-2 rounded-lg hover:bg-primary/90 transition-all flex items-center gap-2; }
            .btn-secondary { @apply bg-secondary text-white px-4 py-2 rounded-lg hover:bg-secondary/90 transition-all flex items-center gap-2; }
            .btn-outline { @apply border border-primary text-primary px-4 py-2 rounded-lg hover:bg-primary/10 transition-all flex items-center gap-2; }
            .btn-danger { @apply border border-red-500 text-red-500 px-4 py-2 rounded-lg hover:bg-red-50 transition-all flex items-center gap-2; }
            .input-field { @apply w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-primary/50; }
            .tab-active { @apply border-b-2 border-primary text-primary; }
            .badge { @apply px-2 py-1 text-xs rounded-full font-medium; }
            .badge-success { @apply bg-green-100 text-green-800; }
            .badge-danger { @apply bg-red-100 text-red-800; }
            .badge-blue { @apply bg-blue-100 text-blue-800; }
            .disabled-btn { @apply bg-gray-300 text-gray-500 cursor-not-allowed px-4 py-2 rounded-lg flex items-center gap-2; }
            .disabled-tab { @apply flex-1 py-4 text-center font-medium text-gray-400 cursor-not-allowed; }
        }
    </style>
</head>
<body class="bg-neutral min-h-screen">
    <div id="loginPage" class="flex items-center justify-center min-h-screen">
        <div class="bg-white rounded-lg shadow-md p-8 w-full max-w-md">
            <div class="text-center mb-6">
                <i class="fa fa-credit-card text-primary text-4xl mb-3"></i>
                <h1 class="text-2xl font-bold text-gray-800">会员卡管理系统</h1>
                <p class="text-gray-500 mt-1">请输入登录密码</p>
            </div>
            <form id="loginForm">
                <div class="mb-4">
                    <label class="block text-sm font-medium text-gray-700 mb-2">登录密码</label>
                    <input type="password" id="loginPwd" class="input-field" placeholder="输入密码后登录" required>
                </div>
                <button type="submit" class="btn-primary w-full py-3">
                    <i class="fa fa-sign-in"></i> 登录系统
                </button>
            </form>
            <div id="loginError" class="mt-4 text-red-500 text-sm text-center hidden">密码错误，请重新输入</div>
        </div>
    </div>

    <div id="mainSystem" class="hidden">
        <header class="bg-white shadow-md sticky top-0 z-50">
            <div class="container mx-auto px-4 py-3 flex justify-between items-center">
                <div class="flex items-center gap-2">
                    <i class="fa fa-credit-card text-primary text-2xl"></i>
                    <h1 class="text-xl font-bold text-gray-800">会员卡管理系统</h1>
                </div>
                <div class="flex items-center gap-3">
                    <span id="userRole" class="text-sm text-gray-600"></span>
                    <button id="logoutBtn" class="btn-outline py-1 px-3 text-sm">
                        <i class="fa fa-sign-out"></i> 退出登录
                    </button>
                </div>
            </div>
        </header>

        <main class="container mx-auto px-4 py-6">
            <div class="bg-white rounded-lg shadow-sm mb-6 overflow-hidden">
                <div class="flex border-b flex-wrap">
                    <button id="tabMembers" class="tab-btn tab-active flex-1 py-4 text-center font-medium" data-tab="members">
                        <i class="fa fa-users mr-2"></i>会员管理
                    </button>
                    <button id="tabConsume" class="tab-btn flex-1 py-4 text-center font-medium text-gray-600 hover:text-primary" data-tab="consume">
                        <i class="fa fa-shopping-cart mr-2"></i>会员扣卡消费
                    </button>
                    <button id="tabMemberTypes" class="tab-btn flex-1 py-4 text-center font-medium text-gray-600 hover:text-primary" data-tab="memberTypes">
                        <i class="fa fa-id-card-o mr-2"></i>会员卡类型
                    </button>
                    <button id="tabProducts" class="tab-btn flex-1 py-4 text-center font-medium text-gray-600 hover:text-primary" data-tab="products">
                        <i class="fa fa-list-alt mr-2"></i>消费项目
                    </button>
                </div>
            </div>

            <div id="members" class="tab-content">
                <div class="bg-white rounded-lg shadow-sm p-6 mb-6">
                    <div class="flex flex-wrap justify-between items-center gap-4 mb-6">
                        <h2 class="text-xl font-bold text-gray-800">会员管理</h2>
                        <div class="flex gap-3">
                            <input type="text" id="memberSearch" placeholder="搜索姓名/手机号" class="input-field w-48">
                            <button id="addMemberBtn" class="btn-primary">
                                <i class="fa fa-plus"></i>添加会员
                            </button>
                        </div>
                    </div>
                    <div class="overflow-x-auto">
                        <table class="w-full min-w-[900px]">
                            <thead>
                                <tr class="border-b">
                                    <th class="py-3 px-4 text-left text-sm text-gray-500">会员信息</th>
                                    <th class="py-3 px-4 text-left text-sm text-gray-500">卡类型</th>
                                    <th class="py-3 px-4 text-left text-sm text-gray-500">密码</th>
                                    <th class="py-3 px-4 text-left text-sm text-gray-500">使用范围</th>
                                    <th class="py-3 px-4 text-left text-sm text-gray-500">账户余额</th>
                                    <th class="py-3 px-4 text-left text-sm text-gray-500">果盘</th>
                                    <th class="py-3 px-4 text-left text-sm text-gray-500">小吃</th>
                                    <th class="py-3 px-4 text-left text-sm text-gray-500">基础酒水</th>
                                    <th class="py-3 px-4 text-left text-sm text-gray-500">中级酒水</th>
                                    <th class="py-3 px-4 text-left text-sm text-gray-500">高级酒水</th>
                                    <th class="py-3 px-4 text-left text-sm text-gray-500">顶级酒水</th>
                                    <th class="py-3 px-4 text-right text-sm text-gray-500">操作</th>
                                </tr>
                            </thead>
                            <tbody id="memberList"></tbody>
                        </table>
                    </div>
                    <div id="noMembers" class="text-center py-12 hidden">
                        <i class="fa fa-users text-gray-300 text-5xl mb-4"></i>
                        <p class="text-gray-500">暂无会员</p>
                    </div>
                </div>
            </div>

            <div id="consume" class="tab-content hidden">
                <div class="bg-white rounded-lg shadow-sm p-6">
                    <h2 class="text-xl font-bold text-gray-800 mb-6">会员领取/消费结算</h2>
                    <div class="mb-5">
                        <label class="block text-sm font-medium text-gray-700 mb-2">选择会员</label>
                        <select id="consumeMemberSelect" class="input-field">
                            <option value="">请选择会员</option>
                        </select>
                    </div>
                    <div id="memberRightsPreview" class="mb-5 hidden">
                        <label class="block text-sm font-medium text-gray-700 mb-2">会员剩余赠送权益</label>
                        <div class="grid grid-cols-3 md:grid-cols-6 gap-3 p-4 bg-gray-50 rounded-lg" id="rightsPreviewBox"></div>
                        <p class="text-red-500 text-sm mt-2">⚠️ 领取赠送品类，请选择【扣赠送权益】；正常消费选择【扣余额】</p>
                    </div>
                    <div class="mb-5">
                        <label class="block text-sm font-medium text-gray-700 mb-2">消费/领取明细</label>
                        <div id="consumeItemBox" class="border rounded-lg p-4 space-y-3">
                            <div class="flex flex-wrap gap-3 item-row">
                                <select class="input-field flex-1 min-w-[200px] consume-product">
                                    <option value="">选择项目</option>
                                </select>
                                <input type="number" min="1" value="1" class="input-field w-24 consume-num" placeholder="数量">
                                <select class="input-field w-32 consume-pay-type">
                                    <option value="balance">扣余额(现金)</option>
                                    <option value="rights">扣赠送权益(领取)</option>
                                </select>
                                <span class="self-center price-text w-20 text-gray-600">¥0.00</span>
                                <button type="button" class="btn-danger del-row">删除</button>
                            </div>
                        </div>
                        <button id="addConsumeRow" class="btn-outline mt-3 text-sm">
                            <i class="fa fa-plus"></i> 新增一行
                        </button>
                    </div>
                    <div class="border-t pt-4 mt-4">
                        <div class="flex justify-between text-lg mb-2">
                            <span>本次现金消费：</span>
                            <span id="deductBalanceMoney" class="text-red-600 font-bold">¥0.00</span>
                        </div>
                        <div class="flex justify-between text-lg mb-4">
                            <span>会员账户余额：</span>
                            <span id="memberBalanceShow" class="text-primary font-bold">¥0.00</span>
                        </div>
                        <button id="submitConsume" class="btn-secondary w-full py-3 text-lg">
                            <i class="fa fa-check"></i> 确认结算
                        </button>
                    </div>
                </div>
            </div>

            <div id="memberTypes" class="tab-content hidden">
                <div class="bg-white rounded-lg shadow-sm p-6">
                    <div class="flex justify-between items-center mb-6">
                        <h2 class="text-xl font-bold text-gray-800">会员卡类型 & 赠送权益配置</h2>
                        <button id="addMemberTypeBtn" class="btn-primary">
                            <i class="fa fa-plus"></i>新增卡类型
                        </button>
                    </div>
                    <div id="memberTypeList" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div>
                </div>
            </div>

            <div id="products" class="tab-content hidden">
                <div class="bg-white rounded-lg shadow-sm p-6">
                    <div class="flex flex-wrap justify-between items-center gap-4 mb-6">
                        <h2 class="text-xl font-bold text-gray-800">消费项目管理</h2>
                        <div class="flex gap-3">
                            <input type="text" id="productSearch" placeholder="搜索项目" class="input-field w-48">
                            <button id="addProductBtn" class="btn-primary">
                                <i class="fa fa-plus"></i>新增项目
                            </button>
                        </div>
                    </div>
                    <div class="overflow-x-auto">
                        <table class="w-full min-w-[600px]">
                            <thead>
                                <tr class="border-b">
                                    <th class="py-3 px-4 text-left text-sm text-gray-500">项目名称</th>
                                    <th class="py-3 px-4 text-left text-sm text-gray-500">单价</th>
                                    <th class="py-3 px-4 text-left text-sm text-gray-500">权益类型</th>
                                    <th class="py-3 px-4 text-left text-sm text-gray-500">状态</th>
                                    <th class="py-3 px-4 text-right text-sm text-gray-500">操作</th>
                                </tr>
                            </thead>
                            <tbody id="productList"></tbody>
                        </table>
                    </div>
                    <div id="noProducts" class="text-center py-12 hidden">
                        <i class="fa fa-shopping-cart text-gray-300 text-5xl mb-4"></i>
                        <p class="text-gray-500">暂无项目</p>
                    </div>
                </div>
            </div>
        </main>

        <!-- 添加会员弹窗 -->
        <div id="addMemberModal" class="fixed inset-0 bg-black/50 z-50 flex items-center justify-center hidden">
            <div class="bg-white rounded-lg w-full max-w-md mx-4 p-5">
                <h3 class="text-lg font-bold mb-4">添加会员</h3>
                <form id="addMemberForm">
                    <div class="mb-3">
                        <label class="block text-sm mb-1">姓名</label>
                        <input type="text" id="memberName" class="input-field" required>
                    </div>
                    <div class="mb-3">
                        <label class="block text-sm mb-1">手机号</label>
                        <input type="tel" id="memberPhone" class="input-field" required>
                    </div>
                    <div class="mb-3">
                        <label class="block text-sm mb-1">会员卡密码</label>
                        <input type="text" id="memberPwd" class="input-field" placeholder="仅记录，无登录功能">
                    </div>
                    <div class="mb-3">
                        <label class="block text-sm mb-1">使用范围</label>
                        <input type="text" id="memberScope" class="input-field" placeholder="例如：仅限XX门店使用">
                    </div>
                    <div class="mb-3">
                        <label class="block text-sm mb-1">会员卡类型</label>
                        <select id="memberTypeSelect" class="input-field" required></select>
                    </div>
                    <div class="mb-4">
                        <label class="block text-sm mb-1">充值金额</label>
                        <input type="number" id="memberBalance" class="input-field" min="0" required>
                    </div>
                    <div class="flex gap-3 justify-end">
                        <button type="button" class="close-modal btn-outline">取消</button>
                        <button type="submit" class="btn-primary">保存</button>
                    </div>
                </form>
            </div>
        </div>

        <!-- 编辑会员弹窗 -->
        <div id="editMemberModal" class="fixed inset-0 bg-black/50 z-50 flex items-center justify-center hidden">
            <div class="bg-white rounded-lg w-full max-w-md mx-4 p-5">
                <h3 class="text-lg font-bold mb-4">编辑会员</h3>
                <form id="editMemberForm">
                    <input type="hidden" id="editMemberId">
                    <div class="mb-3">
                        <label class="block text-sm mb-1">姓名</label>
                        <input type="text" id="editMemberName" class="input-field" required>
                    </div>
                    <div class="mb-3">
                        <label class="block text-sm mb-1">手机号</label>
                        <input type="tel" id="editMemberPhone" class="input-field" required>
                    </div>
                    <div class="mb-3">
                        <label class="block text-sm mb-1">会员卡密码</label>
                        <input type="text" id="editMemberPwd" class="input-field">
                    </div>
                    <div class="mb-3">
                        <label class="block text-sm mb-1">使用范围</label>
                        <input type="text" id="editMemberScope" class="input-field">
                    </div>
                    <div class="mb-3">
                        <label class="block text-sm mb-1">会员卡类型</label>
                        <select id="editMemberTypeSelect" class="input-field" required></select>
                    </div>
                    <div class="mb-4">
                        <label class="block text-sm mb-1">账户余额</label>
                        <input type="number" id="editMemberBalance" class="input-field" min="0" required>
                    </div>
                    <div class="flex gap-3 justify-end">
                        <button type="button" class="close-modal btn-outline">取消</button>
                        <button type="submit" class="btn-primary">保存修改</button>
                    </div>
                </form>
            </div>
        </div>

        <!-- 添加卡类型弹窗 -->
        <div id="addTypeModal" class="fixed inset-0 bg-black/50 z-50 flex items-center justify-center hidden">
            <div class="bg-white rounded-lg w-full max-w-md mx-4 p-5">
                <h3 class="text-lg font-bold mb-4">新增会员卡类型</h3>
                <form id="addTypeForm">
                    <div class="mb-3">
                        <label class="block text-sm mb-1">卡名称</label>
                        <input type="text" id="typeName" class="input-field" required>
                    </div>
                    <div class="mb-3">
                        <label class="block text-sm mb-1">使用范围</label>
                        <input type="text" id="typeScope" class="input-field">
                    </div>
                    <div class="mb-3 grid grid-cols-2 gap-3">
                        <div>
                            <label class="block text-sm mb-1">果盘赠送次数</label>
                            <input type="number" id="typeFruit" class="input-field" min="0" value="0">
                        </div>
                        <div>
                            <label class="block text-sm mb-1">小吃赠送次数</label>
                            <input type="number" id="typeSnack" class="input-field" min="0" value="0">
                        </div>
                        <div>
                            <label class="block text-sm mb-1">基础酒水</label>
                            <input type="number" id="typeDrink1" class="input-field" min="0" value="0">
                        </div>
                        <div>
                            <label class="block text-sm mb-1">中级酒水</label>
                            <input type="number" id="typeDrink2" class="input-field" min="0" value="0">
                        </div>
                        <div>
                            <label class="block text-sm mb-1">高级酒水</label>
                            <input type="number" id="typeDrink3" class="input-field" min="0" value="0">
                        </div>
                        <div>
                            <label class="block text-sm mb-1">顶级酒水</label>
                            <input type="number" id="typeDrink4" class="input-field" min="0" value="0">
                        </div>
                    </div>
                    <div class="flex gap-3 justify-end mt-4">
                        <button type="button" class="close-modal btn-outline">取消</button>
                        <button type="submit" class="btn-primary">保存</button>
                    </div>
                </form>
            </div>
        </div>

        <!-- 添加消费项目弹窗 -->
        <div id="addProductModal" class="fixed inset-0 bg-black/50 z-50 flex items-center justify-center hidden">
            <div class="bg-white rounded-lg w-full max-w-md mx-4 p-5">
                <h3 class="text-lg font-bold mb-4">新增消费项目</h3>
                <form id="addProductForm">
                    <div class="mb-3">
                        <label class="block text-sm mb-1">项目名称</label>
                        <input type="text" id="productName" class="input-field" required>
                    </div>
                    <div class="mb-3">
                        <label class="block text-sm mb-1">对应权益类型</label>
                        <select id="productType" class="input-field">
                            <option value="0">果盘</option>
                            <option value="1">小吃</option>
                            <option value="2">基础酒水</option>
                            <option value="3">中级酒水</option>
                            <option value="4">高级酒水</option>
                            <option value="5">顶级酒水</option>
                        </select>
                    </div>
                    <div class="mb-4">
                        <label class="block text-sm mb-1">单价</label>
                        <input type="number" id="productPrice" class="input-field" min="0" step="0.01" required>
                    </div>
                    <div class="flex gap-3 justify-end">
                        <button type="button" class="close-modal btn-outline">取消</button>
                        <button type="submit" class="btn-primary">保存</button>
                    </div>
                </form>
            </div>
        </div>

        <div id="toast" class="fixed top-4 right-4 bg-green-500 text-white px-4 py-2 rounded-lg shadow-lg transition-transform translate-x-full z-50"></div>
    </div>

    <script>
        // ========== 已填好你的配置，直接使用 ==========
        const GIST_ID = "227f80846dfe7e36670dc65d1ef3147e";
        const GITHUB_TOKEN = "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";

        let currentRole = '';
        let members = [];
        let memberTypes = [];
        let products = [];
        const toast = document.getElementById('toast');

        document.addEventListener('DOMContentLoaded', async function () {
            await loadAllDataFromGist();
            initLogin();
            bindModalClose();
        });

        // 从Gist读取云端数据
        async function loadAllDataFromGist() {
            try {
                const res = await fetch(`https://api.github.com/gists/${GIST_ID}`, {
                    headers: { Authorization: `token ${GITHUB_TOKEN}` }
                });
                const data = await res.json();
                const json = JSON.parse(data.files['data.json'].content);
                
                members = json.members || [];
                memberTypes = json.cardTypes || [];
                products = json.products || [];

                members = members.map(m => ({
                    ...m,
                    id: Number(m.id),
                    balance: Number(m.balance),
                    fruit: Number(m.fruit || 0),
                    snack: Number(m.snack || 0),
                    drink1: Number(m.drink1 || 0),
                    drink2: Number(m.drink2 || 0),
                    drink3: Number(m.drink3 || 0),
                    drink4: Number(m.drink4 || 0)
                }));

                showSystem();
            } catch (e) {
                console.error(e);
                showToast("加载云端数据失败，请检查网络与Token权限");
            }
        }

        // 保存数据到Gist云端
        async function saveDataToGist() {
            try {
                const content = JSON.stringify({
                    members,
                    cardTypes: memberTypes,
                    products
                }, null, 2);

                await fetch(`https://api.github.com/gists/${GIST_ID}`, {
                    method: 'PATCH',
                    headers: {
                        Authorization: `token ${GITHUB_TOKEN}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        files: { "data.json": { content } }
                    })
                });
                showToast("✅ 数据已同步到云端");
            } catch (e) {
                showToast("❌ 云端同步失败");
            }
        }

        // 登录逻辑
        function initLogin() {
            document.getElementById('loginForm').onsubmit = function (e) {
                e.preventDefault();
                const pwd = document.getElementById('loginPwd').value;
                const errorBox = document.getElementById('loginError');
                if (pwd === '8800') {
                    currentRole = 'boss';
                    document.getElementById('userRole').textContent = '当前身份：老板（全权限）';
                    errorBox.classList.add('hidden');
                    showSystem();
                } else if (pwd === '1100') {
                    currentRole = 'employee';
                    document.getElementById('userRole').textContent = '当前身份：员工（仅扣费）';
                    errorBox.classList.add('hidden');
                    showSystem();
                    limitEmployeePermission();
                } else {
                    errorBox.classList.remove('hidden');
                    document.getElementById('loginPwd').value = '';
                }
            };

            document.getElementById('logoutBtn').onclick = function () {
                currentRole = '';
                document.getElementById('loginPage').classList.remove('hidden');
                document.getElementById('mainSystem').classList.add('hidden');
            };
        }

        function limitEmployeePermission() {
            document.getElementById('addMemberBtn').disabled = true;
            document.getElementById('addMemberTypeBtn').disabled = true;
            document.getElementById('addProductBtn').disabled = true;
        }

        function showSystem() {
            document.getElementById('loginPage').classList.add('hidden');
            document.getElementById('mainSystem').classList.remove('hidden');
            initTab();
            renderAll();
            bindConsumeEvent();
        }

        // 标签页切换
        function initTab() {
            const btns = document.querySelectorAll('.tab-btn');
            const contents = document.querySelectorAll('.tab-content');
            btns.forEach(btn => {
                btn.onclick = function () {
                    const target = this.dataset.tab;
                    btns.forEach(b => {
                        b.classList.remove('tab-active');
                        b.classList.add('text-gray-600');
                    });
                    this.classList.add('tab-active');
                    this.classList.remove('text-gray-600');
                    contents.forEach(c => c.classList.add('hidden'));
                    document.getElementById(target).classList.remove('hidden');
                };
            });
        }

        // 关闭弹窗
        function bindModalClose() {
            document.querySelectorAll('.close-modal').forEach(btn => {
                btn.onclick = function () {
                    this.closest('.fixed').classList.add('hidden');
                };
            });
        }

        // 整体渲染
        function renderAll() {
            renderMemberType();
            fillMemberTypeSelect();
            renderMember();
            renderProduct();
            fillConsumeMember();
        }

        // 渲染卡类型列表
        function renderMemberType() {
            const box = document.getElementById('memberTypeList');
            let html = '';
            memberTypes.forEach(item => {
                html += `
                <div class="border rounded-lg p-4">
                    <div class="font-bold text-lg">${item.name}</div>
                    <div class="text-sm text-gray-600 mt-1">使用范围：${item.scope || '无'}</div>
                    <div class="grid grid-cols-3 gap-2 mt-3 text-sm">
                        <div>果盘：${item.fruit}</div>
                        <div>小吃：${item.snack}</div>
                        <div>基础酒水：${item.drink1}</div>
                        <div>中级酒水：${item.drink2}</div>
                        <div>高级酒水：${item.drink3}</div>
                        <div>顶级酒水：${item.drink4}</div>
                    </div>
                </div>`;
            });
            box.innerHTML = html;
        }

        // 填充卡类型下拉框
        function fillMemberTypeSelect() {
            const s1 = document.getElementById('memberTypeSelect');
            const s2 = document.getElementById('editMemberTypeSelect');
            let opt = '<option value="">请选择卡类型</option>';
            memberTypes.forEach(t => {
                opt += `<option value="${t.id}">${t.name}</option>`;
            });
            s1.innerHTML = opt;
            s2.innerHTML = opt;
        }

        // 渲染会员列表
        function renderMember(list = members) {
            const box = document.getElementById('memberList');
            const empty = document.getElementById('noMembers');
            if (list.length === 0) {
                box.innerHTML = '';
                empty.classList.remove('hidden');
                return;
            }
            empty.classList.add('hidden');
            let html = '';
            list.forEach(m => {
                let operate = '';
                if (currentRole === 'boss') {
                    operate = `
                        <button class="btn-outline py-1 px-3 text-xs" onclick="openEditMember(${m.id})">编辑</button>
                        <button class="btn-danger py-1 px-3 text-xs" onclick="delMember(${m.id})">删除</button>
                    `;
                }
                html += `
                <tr class="border-b hover:bg-gray-50">
                    <td class="py-3 px-4">${m.name}<br><span class="text-xs text-gray-500">${m.phone}</span></td>
                    <td class="py-3 px-4"><span class="badge badge-blue">${m.typeName}</span></td>
                    <td class="py-3 px-4">${m.pwd || '-'}</td>
                    <td class="py-3 px-4">${m.scope || '-'}</td>
                    <td class="py-3 px-4 font-medium">¥${Number(m.balance).toFixed(2)}</td>
                    <td class="py-3 px-4">${m.fruit}</td>
                    <td class="py-3 px-4">${m.snack}</td>
                    <td class="py-3 px-4">${m.drink1}</td>
                    <td class="py-3 px-4">${m.drink2}</td>
                    <td class="py-3 px-4">${m.drink3}</td>
                    <td class="py-3 px-4">${m.drink4}</td>
                    <td class="py-3 px-4 text-right">${operate}</td>
                </tr>`;
            });
            box.innerHTML = html;
        }

        // 渲染消费项目
        function renderProduct() {
            const box = document.getElementById('productList');
            const empty = document.getElementById('noProducts');
            if (products.length === 0) {
                box.innerHTML = '';
                empty.classList.remove('hidden');
                return;
            }
            empty.classList.add('hidden');
            const typeMap = ['果盘','小吃','基础酒水','中级酒水','高级酒水','顶级酒水'];
            let html = '';
            products.forEach(p => {
                html += `
                <tr class="border-b hover:bg-gray-50">
                    <td class="py-3 px-4">${p.name}</td>
                    <td class="py-3 px-4">¥${Number(p.price).toFixed(2)}</td>
                    <td class="py-3 px-4">${typeMap[p.type]}</td>
                    <td class="py-3 px-4"><span class="badge badge-success">正常</span></td>
                    <td class="py-3 px-4 text-right">
                        <button class="btn-danger py-1 px-3 text-xs" onclick="delProduct(${p.id})">删除</button>
                    </td>
                </tr>`;
            });
            box.innerHTML = html;
        }

        // 消费页填充会员下拉
        function fillConsumeMember() {
            const sel = document.getElementById('consumeMemberSelect');
            let opt = '<option value="">请选择会员</option>';
            members.forEach(m => {
                opt += `<option value="${m.id}">${m.name} - ${m.phone}</option>`;
            });
            sel.innerHTML = opt;
        }

        // 新增会员
        document.getElementById('addMemberForm').onsubmit = async function (e) {
            e.preventDefault();
            const name = document.getElementById('memberName').value.trim();
            const phone = document.getElementById('memberPhone').value.trim();
            const pwd = document.getElementById('memberPwd').value.trim();
            const scope = document.getElementById('memberScope').value.trim();
            const typeId = +document.getElementById('memberTypeSelect').value;
            const balance = +document.getElementById('memberBalance').value;
            const type = memberTypes.find(t => t.id === typeId);

            const newMember = {
                id: Date.now(),
                name, phone, pwd, scope,
                typeId: type.id,
                typeName: type.name,
                balance,
                fruit: type.fruit,
                snack: type.snack,
                drink1: type.drink1,
                drink2: type.drink2,
                drink3: type.drink3,
                drink4: type.drink4
            };
            members.push(newMember);
            await saveDataToGist();
            renderAll();
            this.reset();
            document.getElementById('addMemberModal').classList.add('hidden');
        };

        // 打开编辑会员
        window.openEditMember = function(id) {
            const m = members.find(x => x.id === id);
            if(!m) return;
            document.getElementById('editMemberId').value = m.id;
            document.getElementById('editMemberName').value = m.name;
            document.getElementById('editMemberPhone').value = m.phone;
            document.getElementById('editMemberPwd').value = m.pwd || '';
            document.getElementById('editMemberScope').value = m.scope || '';
            document.getElementById('editMemberTypeSelect').value = m.typeId;
            document.getElementById('editMemberBalance').value = m.balance;
            document.getElementById('editMemberModal').classList.remove('hidden');
        };

        // 编辑会员提交
        document.getElementById('editMemberForm').onsubmit = async function(e) {
            e.preventDefault();
            const id = +document.getElementById('editMemberId').value;
            const m = members.find(x => x.id === id);
            if(!m) return;
            m.name = document.getElementById('editMemberName').value.trim();
            m.phone = document.getElementById('editMemberPhone').value.trim();
            m.pwd = document.getElementById('editMemberPwd').value.trim();
            m.scope = document.getElementById('editMemberScope').value.trim();
            m.typeId = +document.getElementById('editMemberTypeSelect').value;
            m.typeName = memberTypes.find(t=>t.id===m.typeId).name;
            m.balance = +document.getElementById('editMemberBalance').value;

            await saveDataToGist();
            renderAll();
            document.getElementById('editMemberModal').classList.add('hidden');
        };

        // 删除会员
        window.delMember = async function(id) {
            if(!confirm('确定删除该会员？')) return;
            members = members.filter(m => m.id !== id);
            await saveDataToGist();
            renderAll();
        };

        // 新增卡类型
        document.getElementById('addMemberTypeBtn').onclick = function(){
            document.getElementById('addTypeModal').classList.remove('hidden');
        };
        document.getElementById('addTypeForm').onsubmit = async function(e) {
            e.preventDefault();
            const newType = {
                id: Date.now(),
                name: document.getElementById('typeName').value.trim(),
                scope: document.getElementById('typeScope').value.trim(),
                fruit: +document.getElementById('typeFruit').value,
                snack: +document.getElementById('typeSnack').value,
                drink1: +document.getElementById('typeDrink1').value,
                drink2: +document.getElementById('typeDrink2').value,
                drink3: +document.getElementById('typeDrink3').value,
                drink4: +document.getElementById('typeDrink4').value
            };
            memberTypes.push(newType);
            await saveDataToGist();
            renderAll();
            this.reset();
            document.getElementById('addTypeModal').classList.add('hidden');
        };

        // 新增消费项目
        document.getElementById('addProductBtn').onclick = function(){
            document.getElementById('addProductModal').classList.remove('hidden');
        };
        document.getElementById('addProductForm').onsubmit = async function(e) {
            e.preventDefault();
            const newPro = {
                id: Date.now(),
                name: document.getElementById('productName').value.trim(),
                type: +document.getElementById('productType').value,
                price: +document.getElementById('productPrice').value
            };
            products.push(newPro);
            await saveDataToGist();
            renderAll();
            this.reset();
            document.getElementById('addProductModal').classList.add('hidden');
        };

        // 删除消费项目
        window.delProduct = async function(id) {
            if(!confirm('确定删除？')) return;
            products = products.filter(p => p.id !== id);
            await saveDataToGist();
            renderAll();
        };

        // 消费相关事件
        function bindConsumeEvent() {
            const addRowBtn = document.getElementById('addConsumeRow');
            const box = document.getElementById('consumeItemBox');
            const memberSel = document.getElementById('consumeMemberSelect');

            // 新增消费行
            addRowBtn.onclick = function(){
                const row = box.querySelector('.item-row').cloneNode(true);
                row.querySelectorAll('input,select').forEach(el=>{
                    if(el.classList.contains('consume-num')) el.value = 1;
                    if(el.classList.contains('consume-pay-type')) el.value = 'balance';
                });
                row.querySelector('.price-text').innerText = '¥0.00';
                box.appendChild(row);
                bindRowEvent(row);
            };

            // 初始行绑定
            bindRowEvent(box.querySelector('.item-row'));

            // 切换会员
            memberSel.onchange = function(){
                const mid = +this.value;
                const previewBox = document.getElementById('memberRightsPreview');
                const rightsBox = document.getElementById('rightsPreviewBox');
                const balanceShow = document.getElementById('memberBalanceShow');
                if(!mid){
                    previewBox.classList.add('hidden');
                    return;
                }
                const m = members.find(x=>x.id===mid);
                previewBox.classList.remove('hidden');
                balanceShow.innerText = `¥${m.balance.toFixed(2)}`;
                rightsBox.innerHTML = `
                    <div>果盘：${m.fruit}</div>
                    <div>小吃：${m.snack}</div>
                    <div>基础酒水：${m.drink1}</div>
                    <div>中级酒水：${m.drink2}</div>
                    <div>高级酒水：${m.drink3}</div>
                    <div>顶级酒水：${m.drink4}</div>
                `;
            };

            // 提交结算
            document.getElementById('submitConsume').onclick = async function(){
                const mid = +document.getElementById('consumeMemberSelect').value;
                if(!mid) return showToast("请先选择会员");
                const m = members.find(x=>x.id===mid);
                if(!m) return;

                const rows = box.querySelectorAll('.item-row');
                let totalPay = 0;
                let hasError = false;

                rows.forEach(row=>{
                    const proSel = row.querySelector('.consume-product');
                    const num = +row.querySelector('.consume-num').value;
                    const payType = row.querySelector('.consume-pay-type').value;
                    const pid = +proSel.value;
                    if(!pid || num <= 0) { hasError = true; return; }
                    const pro = products.find(p=>p.id===pid);
                    if(payType === 'balance'){
                        totalPay += pro.price * num;
                    }else{
                        switch(pro.type){
                            case 0: m.fruit -= num; break;
                            case 1: m.snack -= num; break;
                            case 2: m.drink1 -= num; break;
                            case 3: m.drink2 -= num; break;
                            case 4: m.drink3 -= num; break;
                            case 5: m.drink4 -= num; break;
                        }
                    }
                });

                if(hasError) return showToast("请完善消费项目与数量");
                if(m.balance < totalPay) return showToast("会员余额不足");

                m.balance -= totalPay;
                await saveDataToGist();
                renderAll();
                box.innerHTML = `
                <div class="flex flex-wrap gap-3 item-row">
                    <select class="input-field flex-1 min-w-[200px] consume-product">
                        <option value="">选择项目</option>
                    </select>
                    <input type="number" min="1" value="1" class="input-field w-24 consume-num" placeholder="数量">
                    <select class="input-field w-32 consume-pay-type">
                        <option value="balance">扣余额(现金)</option>
                        <option value="rights">扣赠送权益(领取)</option>
                    </select>
                    <span class="self-center price-text w-20 text-gray-600">¥0.00</span>
                    <button type="button" class="btn-danger del-row">删除</button>
                </div>`;
                bindRowEvent(box.querySelector('.item-row'));
                showToast("消费结算完成");
            };
        }

        function bindRowEvent(row) {
            const proSel = row.querySelector('.consume-product');
            const numInput = row.querySelector('.consume-num');
            const priceText = row.querySelector('.price-text');
            const delBtn = row.querySelector('.del-row');

            // 填充项目下拉
            let opt = '<option value="">选择项目</option>';
            products.forEach(p=>{
                opt += `<option value="${p.id}">${p.name} ¥${p.price}</option>`;
            });
            proSel.innerHTML = opt;

            function calcPrice(){
                const pid = +proSel.value;
                const num = +numInput.value || 0;
                const p = products.find(x=>x.id===pid);
                if(p){
                    priceText.innerText = `¥${(p.price * num).toFixed(2)}`;
                }else{
                    priceText.innerText = '¥0.00';
                }
            }
            proSel.onchange = calcPrice;
            numInput.oninput = calcPrice;
            delBtn.onclick = function(){
                const allRows = document.querySelectorAll('.item-row');
                if(allRows.length <= 1) return;
                row.remove();
            };
        }

        // 消息提示
        function showToast(msg) {
            toast.innerText = msg;
            toast.classList.remove('translate-x-full');
            setTimeout(() => toast.classList.add('translate-x-full'), 2500);
        }

        // 页面搜索
        document.getElementById('memberSearch').oninput = function(){
            const key = this.value.trim().toLowerCase();
            const filter = members.filter(m=>
                m.name.toLowerCase().includes(key) || m.phone.includes(key)
            );
            renderMember(filter);
        };
        document.getElementById('productSearch').oninput = function(){
            const key = this.value.trim().toLowerCase();
            const filter = products.filter(p=>
                p.name.toLowerCase().includes(key)
            );
            const box = document.getElementById('productList');
            const empty = document.getElementById('noProducts');
            if(filter.length === 0){
                box.innerHTML = '';
                empty.classList.remove('hidden');
                return;
            }
            empty.classList.add('hidden');
            const typeMap = ['果盘','小吃','基础酒水','中级酒水','高级酒水','顶级酒水'];
            let html = '';
            filter.forEach(p => {
                html += `
                <tr class="border-b hover:bg-gray-50">
                    <td class="py-3 px-4">${p.name}</td>
                    <td class="py-3 px-4">¥${Number(p.price).toFixed(2)}</td>
                    <td class="py-3 px-4">${typeMap[p.type]}</td>
                    <td class="py-3 px-4"><span class="badge badge-success">正常</span></td>
                    <td class="py-3 px-4 text-right">
                        <button class="btn-danger py-1 px-3 text-xs" onclick="delProduct(${p.id})">删除</button>
                    </td>
                </tr>`;
            });
            box.innerHTML = html;
        };
    </script>
</body>
</html>
